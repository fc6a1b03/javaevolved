---
title: AOT ক্লাস প্রিলোডিং (AOT class preloading)
oldApproach: কোল্ড স্টার্ট প্রতিবার
modernApproach: AOT ক্যাশে
summary: তাত্ক্ষণিক স্টার্টআপের জন্য ক্লাস লোডিং (class loading) এবং কম্পাইলেশন (compilation) ক্যাশ করুন।
explanation: AOT ক্লাস প্রিলোডিং একটি ট্রেনিং রান থেকে লোড করা এবং লিঙ্ক করা ক্লাসগুলোকে ক্যাশ করে। পরবর্তী স্টার্টআপে, ক্লাসগুলো ক্যাশ থেকে লোড হয়, যা ভ্যারিফিকেশন (verification) এবং লিঙ্কিং (linking) ধাপগুলো এড়িয়ে যায়। AOT কম্পাইলেশনের (compilation) সাথে মিলিত হলে, এটি স্টার্টআপ টাইমকে নাটকীয়ভাবে কমিয়ে দেয়।
