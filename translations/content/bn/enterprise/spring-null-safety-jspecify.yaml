---
title: JSpecify সহ Spring Null Safety
oldApproach: Spring @NonNull/@Nullable
modernApproach: JSpecify @NullMarked
summary: Spring 7 JSpecify অ্যানোটেশন গ্রহণ করেছে, যা নন-নালকে ডিফল্ট করে এবং অ্যানোটেশনের সংখ্যা কমিয়ে আসে।
explanation: Spring 5 এবং 6 `org.springframework.lang` প্যাকেজে তাদের নিজস্ব Null Safety অ্যানোটেশন চালু করেছিল। যদিও সেগুলো উপকারী ছিল, কিন্তু ফ্রেমওয়ার্ক-নির্দিষ্ট ছিল এবং প্রতিটি নন-নাল এলিমেন্টকে স্পষ্টভাবে অ্যানোটেট (annotate) করার প্রয়োজন হতো। Spring 7 JSpecify-তে মাইগ্রেট করেছে, যা Null Safety-এর জন্য একটি ক্রস-ইকোসিস্টেম স্ট্যান্ডার্ড। `@NullMarked` অ্যানোটেশন ক্লাস বা প্যাকেজ লেভেলে ঘোষণা করে যে, ডিফল্টরূপে সমস্ত আনঅ্যানোটেটেড টাইপ নন-নাল। শুধুমাত্র প্রকৃত নালএবল টাইপগুলির জন্য `@Nullable` অ্যানোটেশন প্রয়োজন, যা কোডের ভার্বোসিটি (verbosity) উল্লেখযোগ্যভাবে হ্রাস করে। JSpecify অ্যানোটেশনগুলি NullAway, Error Prone এবং IntelliJ IDEA-এর মতো প্রধান স্ট্যাটিক অ্যানালাইসিস টুল দ্বারা স্বীকৃত, যা Spring-নির্দিষ্ট অ্যানোটেশনগুলোর চেয়ে আরও সমৃদ্ধ টুলিং সাপোর্ট নিয়ে আসে।
whyModernWins:
- icon: "✂️"
  title: ডিফল্টরূপে নন-নাল
  desc: @NullMarked সমস্ত আনঅ্যানোটেটেড টাইপকে নন-নাল করে তোলে, তাই শুধুমাত্র নালএবল (nullable) ব্যতিক্রমগুলির জন্য অ্যানোটেশন প্রয়োজন।
- icon: "🌐"
  title: ইকোসিস্টেম স্ট্যান্ডার্ড
  desc: JSpecify অ্যানোটেশনগুলো NullAway, Error Prone এবং IDEs দ্বারা স্বীকৃত একটি ক্রস-ফ্রেমওয়ার্ক স্ট্যান্ডার্ড।
- icon: "🔍"
  title: সমৃদ্ধ টুলিং
  desc: আধুনিক স্ট্যাটিক অ্যানালাইজারগুলো JSpecify-এর নাল মডেল বোঝে এবং কম্পাইল টাইমে ভায়োলেশনের (violations) রিপোর্ট করে।
support:
  description: Spring Framework 7.0 থেকে উপলব্ধ (Java 17+ প্রয়োজন)