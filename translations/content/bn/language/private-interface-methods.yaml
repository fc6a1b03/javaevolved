---
title: প্রাইভেট ইন্টারফেস মেথড (Private Interface Methods)
oldApproach: ডুপ্লিকেটেড লজিক
modernApproach: প্রাইভেট মেথডস (Private Methods)
summary: প্রাইভেট মেথড ব্যবহার করে ইন্টারফেসে শেয়ারড লজিক (shared logic) এক্সট্র্যাক্ট করুন।
explanation: Java 9 ইন্টারফেসে প্রাইভেট মেথড ব্যবহারের অনুমতি দেয়, যা আপনাকে ইমপ্লিমেন্টিং ক্লাসগুলোর (implementing classes) কাছে ইমপ্লিমেন্টেশন ডিটেইলস এক্সপোজ না করেই ডিফল্ট মেথডগুলোর মধ্যে কোড শেয়ার করতে সক্ষম করে।
whyModernWins:
- icon: "🧩"
  title: কোড রিইউজ (Code Reuse)
  desc: ডুপ্লিকেশন ছাড়াই ডিফল্ট মেথডগুলোর মধ্যে লজিক শেয়ার করুন।
- icon: "🔐"
  title: এনক্যাপসুলেশন (Encapsulation)
  desc: ইমপ্লিমেন্টেশন ডিটেইলস ইমপ্লিমেন্টিং ক্লাসগুলো থেকে লুকানো থাকে।
- icon: "🧹"
  title: DRY ইন্টারফেস
  desc: ডিফল্ট মেথডগুলোর মধ্যে আর কপি-পেস্টের প্রয়োজন নেই।
support:
  description: JDK 9 (সেপ্টেম্বর 2017) থেকে ব্যাপকভাবে উপলব্ধ