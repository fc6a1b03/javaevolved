---
title: রেকর্ড প্যাটার্ন (Destructuring)
oldApproach: ম্যানুয়াল অ্যাক্সেস
modernApproach: ডিস্ট্রাকচারিং (Destructuring)
summary: প্যাটার্নগুলোতে সরাসরি রেকর্ডগুলো ডিস্ট্রাকচার করুন – এক স্টেপেই ফিল্ড এক্সট্র্যাক্ট করুন।
explanation: রেকর্ড প্যাটার্ন (Record patterns) আপনাকে instanceof এবং switch স্টেটমেন্টে একটি রেকর্ডের কম্পোনেন্টগুলো সরাসরি ডিকম্পোজ (decompose) করতে দেয়। নেস্টেড প্যাটার্নও সাপোর্টেড, যা ইন্টারমিডিয়েট ভ্যারিয়েবল ছাড়াই ডিপ ম্যাচিং (deep matching) সক্ষম করে।
whyModernWins:
- icon: "🎯"
  title: সরাসরি এক্সট্রাকশন (Direct Extraction)
  desc: ম্যানুয়ালি অ্যাক্সেসর (accessors) কল না করেই রেকর্ড কম্পোনেন্টগুলো অ্যাক্সেস করুন।
- icon: "🪆"
  title: নেস্টেবল (Nestable)
  desc: প্যাটার্নগুলো নেস্ট করা যায় – একটি সিঙ্গেল এক্সপ্রেশনে ইনার রেকর্ডগুলো ম্যাচ করা যায়।
- icon: "📏"
  title: কমপ্যাক্ট কোড
  desc: পাঁচ লাইনের কোড দুই লাইনে পরিণত হয় – কম আনুষ্ঠানিকতা, একই স্বচ্ছতা।
support:
  description: JDK 21 LTS (সেপ্টেম্বর 2023) থেকে ব্যাপকভাবে উপলব্ধ