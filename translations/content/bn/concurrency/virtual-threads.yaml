explanation: ভার্চুয়াল থ্রেডগুলো মূলত JVM দ্বারা পরিচালিত লাইটওয়েট থ্রেড, অপারেটিং সিস্টেমের নয়। থ্রেড পুল টিউনিংয়ের ঝামেলা ছাড়াই আপনি এগুলো লক্ষ লক্ষ তৈরি করতে পারবেন। এইচটিটিপি (HTTP) কল এবং ডেটাবেস কোয়েরির মতো I/O-বাউন্ড কাজের জন্য এগুলো একদম আদর্শ।
