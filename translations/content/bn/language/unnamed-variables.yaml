---
title: _ (আন্ডারস্কোর) ব্যবহার করে আননেমড ভ্যারিয়েবল (Unnamed variables with _)
oldApproach: অব্যবহৃত ভ্যারিয়েবল (Unused Variable)
modernApproach: _ প্লেসহোল্ডার (Placeholder)
summary: যখন একটি ভ্যারিয়েবল ইচ্ছাকৃতভাবে ব্যবহার করা হয় না, তখন উদ্দেশ্য বোঝাতে _ ব্যবহার করুন।
explanation: আননেমড ভ্যারিয়েবল (Unnamed variables) পাঠক এবং টুলগুলোকে বোঝায় যে, একটি ভ্যালুকে ইচ্ছাকৃতভাবে ইগনোর করা হয়েছে। এর ফলে আর 'ignored' বা 'unused' নামকরণের কনভেনশন (conventions) বা IDE ওয়ার্নিংয়ের (warnings) প্রয়োজন হয় না।
whyModernWins:
- icon: "📢"
  title: সুস্পষ্ট উদ্দেশ্য
  desc: _ স্পষ্টভাবে নির্দেশ করে 'এই ভ্যালুটি এখানে প্রয়োজন নেই'।
- icon: "🔇"
  title: কোনো ওয়ার্নিং নেই
  desc: IDEs এবং লিন্টাররা (linters) ইচ্ছাকৃতভাবে অব্যবহৃত ভ্যারিয়েবলগুলোকে ফ্ল্যাগ করবে না।
- icon: "🧹"
  title: ক্লিনার ল্যাম্বডাস (Cleaner Lambdas)
  desc: যখন শুধুমাত্র কিছু প্যারামিটার প্রয়োজন হয়, তখন মাল্টি-প্যারাম ল্যাম্বডাগুলো (multi-param lambdas) আরও পরিষ্কার হয়।
support:
  description: JDK 22 (JEP 456, মার্চ 2024) এ চূড়ান্ত হয়েছে।