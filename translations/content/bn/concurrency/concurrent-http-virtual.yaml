---
title: ভার্চুয়াল থ্রেড ব্যবহার করে কনকারেন্ট HTTP রিকোয়েস্ট
oldApproach: থ্রেড পুল + URL কানেকশন (URLConnection)
modernApproach: ভার্চুয়াল থ্রেড + HttpClient
summary: ভার্চুয়াল থ্রেড এবং HttpClient ব্যবহার করে একসাথে একাধিক ইউআরএল (URL) থেকে ডেটা ফেচ (fetch) করুন।
explanation: ভার্চুয়াল থ্রেড প্রতিটি HTTP রিকোয়েস্টের জন্য একটি করে থ্রেড তৈরি করাকে বাস্তবসম্মত করে তোলে। HttpClient-এর সাথে এর সমন্বয়ে, এটি জটিল অ্যাসিঙ্ক কলব্যাক প্যাটার্নগুলোকে সহজ ব্লকিং কোড দিয়ে প্রতিস্থাপন করে, যা সহজেই স্কেল করা যায়।
whyModernWins:
- icon: "♾️"
  title: প্রতি রিকোয়েস্টের জন্য থ্রেড
  desc: কোনো থ্রেড পুল সাইজিংয়ের প্রয়োজন নেই – প্রতিটি ইউআরএল-এর জন্য একটি ভার্চুয়াল থ্রেড।
- icon: "📖"
  title: সহজ কোড
  desc: সরাসরি ব্লকিং কোড লিখুন।
- icon: "⚡"
  title: হাই থ্রুপুট (High Throughput)
  desc: ন্যূনতম রিসোর্স ব্যবহার করে হাজার হাজার কনকারেন্ট রিকোয়েস্ট (concurrent requests) হ্যান্ডেল করা যায়।
support:
  description: JDK 21 LTS (সেপ্টেম্বর 2023) থেকে ব্যাপকভাবে উপলব্ধ