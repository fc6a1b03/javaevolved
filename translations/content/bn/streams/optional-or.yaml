---
title: Optional.or() ফলব্যাক
oldApproach: নেস্টেড ফলব্যাক
modernApproach: .or() চেইন
summary: নেস্টেড চেক ছাড়াই Optional ফলব্যাক চেইন করুন।
explanation: Optional.or() মেথডটি যদি অরিজিনাল অপশনালে ভ্যালু থাকে তাহলে সেটি রিটার্ন করে, অন্যথায় বিকল্প অপশনাল পাওয়ার জন্য সাপ্লায়ারকে (supplier) ইভালুয়েট (evaluate) করে। সাপ্লায়ারগুলো লেজি (lazy) – অর্থাৎ কেবল প্রয়োজন হলেই কল করা হয়।
whyModernWins:
- icon: "🔗"
