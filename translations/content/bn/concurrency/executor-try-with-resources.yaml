---
title: ExecutorService অটো-ক্লোজ (Auto-Close)
oldApproach: ম্যানুয়াল শাটডাউন
modernApproach: ট্রাই-উইথ-রিসোর্স (try-with-resources)
summary: অটোমেটিক এক্সিকিউটর শাটডাউনের জন্য ট্রাই-উইথ-রিসোর্স ব্যবহার করুন।
explanation: জাভা 19 থেকে, ExecutorService AutoCloseable ইন্টারফেস ইমপ্লিমেন্ট করে। close() মেথডটি shutdown() মেথড কল করে এবং টাস্কগুলো শেষ হওয়ার জন্য অপেক্ষা করে। এর ফলে ম্যানুয়াল try/finally শাটডাউন প্যাটার্নের আর প্রয়োজন নেই।
whyModernWins:
- icon: "🧹"
  title: অটো ক্লিনআপ (Auto Cleanup)
  desc: ব্লক থেকে বের হওয়ার সাথে সাথেই শাটডাউন স্বয়ংক্রিয়ভাবে সম্পন্ন হয়।
- icon: "🛡️"
  title: কোনো রিসোর্স লিক নেই
  desc: ব্যতিক্রম (exceptions) ঘটলেও এক্সিকিউটর সবসময় শাটডাউন হয়।
- icon: "📖"
  title: পরিচিত প্যাটার্ন
  desc: ফাইল, কানেকশন ইত্যাদির জন্য ব্যবহৃত ট্রাই-উইথ-রিসোর্স প্যাটার্নের মতোই।
support:
  description: JDK 19 (সেপ্টেম্বর 2022) থেকে ব্যাপকভাবে উপলব্ধ