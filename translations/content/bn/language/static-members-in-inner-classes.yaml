---
title: ইনার ক্লাসগুলোতে স্ট্যাটিক মেম্বার (Static members in inner classes)
oldApproach: স্ট্যাটিক নেস্টেড ক্লাস ব্যবহার করতে হবে
modernApproach: ইনার ক্লাসগুলোতে স্ট্যাটিক মেম্বার
summary: স্ট্যাটিক নেস্টেড ক্লাসের প্রয়োজন ছাড়াই ইনার ক্লাসগুলোতে স্ট্যাটিক মেম্বার ডিফাইন করুন।
explanation: Java 16 এর আগে, শুধুমাত্র স্ট্যাটিক নেস্টেড ক্লাসগুলোই স্ট্যাটিক মেম্বার ধারণ করতে পারত। ইনার (নন-স্ট্যাটিক) ক্লাসগুলোতে স্ট্যাটিক মেম্বার থাকতে পারত না কারণ সেগুলোর জন্য একটি এনক্লোজিং ইনস্ট্যান্সের প্রয়োজন হতো। Java 16 এই সীমাবদ্ধতা শিথিল করেছে, যা ইনার ক্লাসগুলোতে স্ট্যাটিক ফিল্ড, মেথড এবং এমনকি নেস্টেড টাইপগুলোর অনুমতি দেয়।
whyModernWins:
