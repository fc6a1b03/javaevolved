---
title: Stream.toList()
oldApproach: collect(Collectors.toList())
modernApproach: .toList()
summary: টার্মিনাল toList() মেথডটি verbose collect(Collectors.toList())-কে প্রতিস্থাপন করে।
explanation: Stream.toList() মেথডটি একটি আনমডিফাইয়েবল লিস্ট (unmodifiable list) রিটার্ন করে। এটি .collect(Collectors.toUnmodifiableList()) এর সমতুল্য, কিন্তু অনেক সংক্ষিপ্ত। উল্লেখ্য যে, এর ফলাফল ইমিউটেবল (immutable), Collectors.toList()-এর মতো নয়।
