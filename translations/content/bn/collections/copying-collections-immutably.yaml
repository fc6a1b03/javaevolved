---
title: কালেকশনকে ইমিউটেবল (অপরিবর্তনীয়) ভাবে কপি করা
oldApproach: ম্যানুয়াল কপি + র‍্যাপ
modernApproach: List.copyOf()
summary: যেকোনো কালেকশনের একটি ইমিউটেবল কপি এক কল (call)-এই তৈরি করুন।
explanation: List.copyOf(), Set.copyOf(), এবং Map.copyOf() বিদ্যমান কালেকশনগুলোর ইমিউটেবল স্ন্যাপশট তৈরি করে। যদি সোর্স কালেকশনটি ইতিমধ্যেই ইমিউটেবল হয়, তবে কোনো নতুন কপি তৈরি করা হয় না।
whyModernWins:
- icon: "⚡"
  title: স্মার্ট কপি
  desc: সোর্স কালেকশনটি ইমিউটেবল হলে, নতুন করে কপি করার প্রয়োজন হয় না।
- icon: "📏"
  title: এক কলে কাজ শেষ
  desc: ম্যানুয়াল ArrayList তৈরি বা র‍্যাপ করার দরকার নেই।
- icon: "🛡️"
  title: ডিফেন্সিভ কপি
  desc: মূল কালেকশনে পরিবর্তন আনলেও কপি করা কালেকশনে তার কোনো প্রভাব পড়ে না।
support:
  description: JDK 10 (মার্চ 2018) থেকে ব্যাপকভাবে উপলব্ধ