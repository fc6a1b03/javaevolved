---
title: ইমিউটেবল (Immutable) লিস্ট তৈরি
oldApproach: ভার্বোস র‍্যাপিং
modernApproach: List.of()
summary: একটি পরিষ্কার এক্সপ্রেশন ব্যবহার করে ইমিউটেবল লিস্ট তৈরি করুন।
explanation: List.of() একটি সত্যিকারের ইমিউটেবল লিস্ট তৈরি করে - এখানে কোনো র‍্যাপিং বা ডিফেন্সিভ কপির প্রয়োজন হয় না। এটি null-হোস্টাইল (অর্থাৎ null এলিমেন্ট গ্রহণ করে না) এবং কাঠামোগতভাবেও ইমিউটেবল। পুরোনো পদ্ধতিতে তিনটি নেস্টেড কল ব্যবহার করতে হতো।
whyModernWins:
- icon: "📏"
  title: এক কলেই
  desc: তিনটি নেস্টেড কলকে একটি মাত্র ফ্যাক্টরি মেথড দিয়ে প্রতিস্থাপন করা যায়।
- icon: "🔒"
  title: সত্যিকারের ইমিউটেবল
  desc: এটি কেবল একটি র‍্যাপার নয় – লিস্টটি নিজেই ইমিউটেবল।
- icon: "🛡️"
  title: null-সেফ
  desc: তৈরির সময়ই null এলিমেন্ট থাকলে তা প্রত্যাখ্যান করে, ফলে দ্রুত ত্রুটি ধরা পড়ে (failing fast)।
support:
  description: JDK 9 (সেপ্টেম্বর 2017) থেকে ব্যাপকভাবে উপলব্ধ