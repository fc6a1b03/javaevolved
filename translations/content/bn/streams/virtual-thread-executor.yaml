---
title: ভার্চুয়াল থ্রেড এক্সিকিউটর (Virtual Thread Executor)
oldApproach: ফিক্সড থ্রেড পুল (Fixed Thread Pool)
modernApproach: ভার্চুয়াল থ্রেড এক্সিকিউটর
summary: সীমাহীন লাইটওয়েট কনকারেন্সির (lightweight concurrency) জন্য ভার্চুয়াল থ্রেড এক্সিকিউটর ব্যবহার করুন।
explanation: ভার্চুয়াল থ্রেড এক্সিকিউটর প্রতিটি টাস্কের জন্য একটি নতুন ভার্চুয়াল থ্রেড তৈরি করে। কোনো পুল সাইজিংয়ের (pool sizing) প্রয়োজন নেই – ভার্চুয়াল থ্রেডগুলো এত সস্তা যে লক্ষ লক্ষ তৈরি করা যায়।
whyModernWins:
