- icon: "🚫"
  title: get() এর প্রয়োজন নেই
  desc: বিপজ্জনক isPresent() + get() প্যাটার্ন বাদ দেয়।
- icon: "🔗"
  title: ফ্লুয়েন্ট
  desc: findUser() বা যেকোনো Optional-রিটার্নিং মেথডের পরে স্বাভাবিকভাবে চেইন হয়।
