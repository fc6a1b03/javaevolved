---
title: নেগেশনের (negation) জন্য Predicate.not()
oldApproach: ল্যাম্বডা নেগেশন
modernApproach: Predicate.not()
summary: ল্যাম্বডা র‍্যাপার না লিখে পরিষ্কারভাবে মেথড রেফারেন্স (method references) নেগেট করতে Predicate.not() ব্যবহার করুন।
explanation: Java 11 এর আগে, একটি মেথড রেফারেন্স নেগেট করার জন্য এটিকে একটি ল্যাম্বডার (lambda) মধ্যে র‍্যাপ করার প্রয়োজন হতো। Predicate.not() মেথডটি আপনাকে সরাসরি যেকোনো প্রেডিকেট (predicate) নেগেট করতে দেয়, যা স্ট্রিম পাইপলাইন জুড়ে কোডকে পঠনযোগ্য এবং মেথড রেফারেন্স স্টাইলের সাথে সামঞ্জস্যপূর্ণ রাখে।
whyModernWins:
- icon: "👁"
  title: ক্লিনার নেগেশন
  desc: শুধুমাত্র নেগেট করার জন্য মেথড রেফারেন্সগুলোকে ল্যাম্বডার মধ্যে র‍্যাপ করার প্রয়োজন নেই।
- icon: "🔗"
  title: কম্পোজেবল (Composable)
  desc: যেকোনো প্রেডিকেট (Predicate) এর সাথে কাজ করে, যা পরিষ্কার প্রেডিকেট চেইন তৈরি করতে সক্ষম।
- icon: "📖"
  title: স্বাভাবিকভাবে পঠনযোগ্য
  desc: Predicate.not(String::isBlank) ইংরেজিতে পড়ার মতোই সহজ।
support:
  description: JDK 11 (সেপ্টেম্বর 2018) থেকে উপলব্ধ।