---
title: JPA বনাম জাকার্তা ডেটা (Jakarta Data)
oldApproach: JPA EntityManager
modernApproach: জাকার্তা ডেটা রিপোজিটরি (Jakarta Data Repository)
summary: একটি রিপোজিটরি ইন্টারফেস ডিক্লেয়ার করুন এবং জাকার্তা ডেটাকে স্বয়ংক্রিয়ভাবে DAO ইমপ্লিমেন্টেশন তৈরি করতে দিন।
explanation: জাকার্তা ডেটা (Jakarta EE 11) ডেটা অ্যাক্সেসকে একটি পিওর ইন্টারফেস ডিক্লারেশনে পরিণত করে। আপনি @Repository অ্যানোটেশন দিয়ে একটি ইন্টারফেস তৈরি করেন এবং CrudRepository-এর মতো বিল্ট-ইন রিপোজিটরি টাইপ এক্সটেন্ড করেন। রানটাইম স্বয়ংক্রিয়ভাবে ইমপ্লিমেন্টেশন জেনারেট করে – FindByName-এর মতো মেথডের নাম থেকে ডেরাইভড কোয়েরি (derived queries) সহ – ফলে কোনো EntityManager বয়লারপ্লেট, JPQL স্ট্রিং বা হাতে লেখা সেভ/ফাইন্ড মেথডের প্রয়োজন হয় না।
whyModernWins:
- icon: "🪄"
  title: জিরো বয়লারপ্লেট (Zero Boilerplate)
  desc: ইন্টারফেস ডিক্লেয়ার করুন; কন্টেইনার ডিপ্লয়ের সময় সম্পূর্ণ DAO ইমপ্লিমেন্টেশন জেনারেট করে।
- icon: "🔍"
  title: ডেরাইভড কোয়েরি (Derived Queries)
  desc: FindByNameAndStatus-এর মতো মেথডের নামগুলো স্বয়ংক্রিয়ভাবে পার্স করা হয় – কোনো JPQL বা SQL এর প্রয়োজন নেই।
- icon: "🔌"
  title: পোর্টেবল (Portable)
  desc: যেকোনো জাকার্তা EE 11 কমপ্লায়েন্ট রানটাইম কোনো ভেন্ডর লক-ইন ছাড়াই রিপোজিটরি ইমপ্লিমেন্টেশন প্রদান করে।
