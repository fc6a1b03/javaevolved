- icon: "📏"
  title: "استدعاء واحد"
  desc: "لا حاجة لإنشاء ArrayList يدوياً ثم تغليفه."
- icon: "🛡️"
  title: "أي مجموعة"
  desc: "يقبل أي Collection كمدخل، دون الحاجة إلى تحويل ArrayList وسيط."
