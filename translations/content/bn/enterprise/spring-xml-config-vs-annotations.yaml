---
title: Spring XML বিন কনফিগ বনাম অ্যানোটেশন-ড্রাইভেন (Annotation-Driven)
oldApproach: XML বিন ডেফিনিশন
modernApproach: অ্যানোটেশন-ড্রাইভেন বিনস (Annotation-Driven Beans)
summary: Spring Boot-এ ভার্বোস Spring XML বিন ডেফিনিশনের পরিবর্তে সংক্ষিপ্ত অ্যানোটেশন-ড্রাইভেন কনফিগারেশন ব্যবহার করুন।
explanation: ঐতিহ্যবাহী Spring অ্যাপ্লিকেশনগুলোতে XML কনফিগারেশন ফাইলগুলির মাধ্যমে বিন যুক্ত করা হতো, যেখানে প্রতিটি ক্লাস এবং এর ডিপেন্ডেন্সিগুলোকে ভার্বোস <bean> এলিমেন্ট হিসেবে ডিক্লেয়ার করা হতো। Spring 2.5 থেকে অ্যানোটেশন সাপোর্ট থাকলেও, Spring Boot অটো-কনফিগারেশন প্রবর্তন না করা পর্যন্ত XML-ই প্রধান অ্যাপ্রোচ ছিল। Spring Boot @Component, @Service, @Repository, এবং @Controller অ্যানোটেশনযুক্ত বিনগুলোকে ক্লাসপথ স্ক্যানিংয়ের মাধ্যমে শনাক্ত করে, কনস্ট্রাক্টর ইনজেকশনের মাধ্যমে স্বয়ংক্রিয়ভাবে ডিপেন্ডেন্সি পূরণ করে এবং ক্লাসপথ থেকে DataSource-এর মতো ইনফ্রাস্ট্রাকচার কনফিগার করে – এর ফলে সমস্ত XML ওয়্যারিং ফাইলের প্রয়োজন হয় না।
whyModernWins:
- icon: "🚫"
  title: XML নেই
  desc: @SpringBootApplication কম্পোনেন্ট স্ক্যানিং এবং অটো-কনফিগারেশন ট্রিগার করে, যার ফলে সমস্ত XML ওয়্যারিং ফাইলের প্রয়োজন দূর হয়।
- icon: "💉"
  title: কনস্ট্রাক্টর ইনজেকশন
  desc: Spring স্বয়ংক্রিয়ভাবে কনস্ট্রাক্টরের মাধ্যমে ডিপেন্ডেন্সি ইনজেক্ট করে, যা বিনগুলোকে সহজে টেস্ট এবং বোঝা যায়।
- icon: "⚡"
  title: অটো-কনফিগারেশন (Auto-configuration)
  desc: Spring Boot জিরো বয়লারপ্লেট সহ ক্লাসপথ থেকে DataSource, JPA, এবং অন্যান্য ইনফ্রাস্ট্রাকচার কনফিগার করে।
support:
  description: Spring Boot 1.0 (এপ্রিল 2014) থেকে ব্যাপকভাবে উপলব্ধ; Spring Boot 3 এর জন্য Java 17+ প্রয়োজন