---
title: instanceof-এর জন্য প্যাটার্ন ম্যাচিং (Pattern matching for instanceof)
oldApproach: instanceof + Cast
modernApproach: প্যাটার্ন ভ্যারিয়েবল (Pattern Variable)
summary: প্যাটার্ন ম্যাচিং ব্যবহার করে টাইপ চেক (type check) এবং কাস্ট (cast) কে এক স্টেপে একত্রিত করুন।
explanation: instanceof-এর জন্য প্যাটার্ন ম্যাচিং টাইপ চেকের পরে অপ্রয়োজনীয় কাস্টকে দূর করে। প্যাটার্ন ভ্যারিয়েবল স্বয়ংক্রিয়ভাবে স্কোপড (scoped) হয় যেখানে প্যাটার্নটি ম্যাচ করে, যা কোডকে আরও নিরাপদ এবং সংক্ষিপ্ত করে তোলে।
whyModernWins:
- icon: "🔄"
  title: কোনো অপ্রয়োজনীয় কাস্ট নেই
  desc: টাইপ চেক এবং ভ্যারিয়েবল বাইন্ডিং একটি সিঙ্গেল এক্সপ্রেশনেই সম্পন্ন হয়।
- icon: "📏"
  title: কম লাইন
  desc: দুটির পরিবর্তে একটি লাইন – কাস্ট লাইনটি সম্পূর্ণরূপে বিলুপ্ত হয়ে যায়।
- icon: "🛡️"
  title: স্কোপ সেফটি (Scope Safety)
  desc: প্যাটার্ন ভ্যারিয়েবল শুধুমাত্র সেই স্কোপে থাকে যেখানে টাইপটি নিশ্চিত (guaranteed) হয়।
support:
  description: JDK 16 (মার্চ 2021) থেকে ব্যাপকভাবে উপলব্ধ