---
title: var ব্যবহার করে টাইপ ইনফারেন্স (Type inference with var)
oldApproach: এক্সপ্লিসিট টাইপস (Explicit Types)
modernApproach: var কীওয়ার্ড
summary: লোকাল ভ্যারিয়েবলের টাইপ ইনফারেন্সের (type inference) জন্য var ব্যবহার করুন – কম জটিলতা, একই সেফটি।
explanation: Java 10 থেকে কম্পাইলার রাইট-হ্যান্ড সাইড থেকে লোকাল ভ্যারিয়েবলগুলোর টাইপ ইনফার (infer) করে। এর ফলে টাইপ সেফটি না কমিয়ে ভিজ্যুয়াল নয়েজ (visual noise) কমে। যখন টাইপ প্রসঙ্গ থেকে স্পষ্ট হয়, তখন var ব্যবহার করুন।
whyModernWins:
- icon: "⚡"
  title: কম বয়লারপ্লেট
  desc: অ্যাসাইনমেন্টের উভয় দিকে জটিল জেনেরিক টাইপ রিপিট করার প্রয়োজন নেই।
- icon: "👁"
  title: উন্নত পঠনযোগ্যতা
  desc: টাইপ ডিক্লারেশনের পরিবর্তে ভ্যারিয়েবল নাম এবং ভ্যালুগুলোর উপর ফোকাস করুন।
- icon: "🔒"
  title: টাইপ-সেফ (Type-safe)
  desc: কম্পাইলার কম্পাইল টাইমে সঠিক টাইপ ইনফার (infer) এবং এনফোর্স (enforce) করে।
support:
  description: JDK 10 (মার্চ 2018) থেকে ব্যাপকভাবে উপলব্ধ