---
title: কমপ্যাক্ট অবজেক্ট হেডারস (Compact Object Headers)
oldApproach: 128-বিট হেডার
modernApproach: 64-বিট হেডার
summary: উন্নত মেমরি ডেনসিটি (memory density) এবং ক্যাশে ব্যবহারের (cache usage) জন্য অবজেক্ট হেডারের আকার অর্ধেক কমিয়ে দিন।
explanation: কমপ্যাক্ট অবজেক্ট হেডার 64-বিট প্ল্যাটফর্মে প্রতি-অবজেক্ট ওভারহেড (per-object overhead) 128 বিট থেকে 64 বিটে কমিয়ে দেয়। এটি মেমরি সেভ করে এবং ক্যাশে ব্যবহার উন্নত করে, বিশেষ করে ছোট অবজেক্টের অ্যাপ্লিকেশনগুলোর জন্য।
whyModernWins:
- icon: "📦"
  title: 50% ছোট হেডার
  desc: প্রতি অবজেক্টে 16 বাইটের পরিবর্তে 8 বাইট।
- icon: "⚡"
  title: উন্নত ক্যাশে ব্যবহার
  desc: CPU ক্যাশে লাইনে আরও অবজেক্ট ফিট হয়।
- icon: "📊"
  title: উচ্চ ঘনত্ব
  desc: একই হিপ সাইজে (heap size) আরও অবজেক্ট ফিট করুন।
support:
  description: JDK 25 LTS (JEP 519, সেপ্টেম্বর 2025) এ চূড়ান্ত হয়েছে।