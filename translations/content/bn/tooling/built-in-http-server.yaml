---
title: বিল্ট-ইন HTTP সার্ভার (Built-in HTTP server)
oldApproach: এক্সটার্নাল সার্ভার / ফ্রেমওয়ার্ক
modernApproach: jwebserver CLI
summary: Java 18 প্রোটোটাইপিং (prototyping) এবং ফাইল সার্ভিংয়ের জন্য একটি বিল্ট-ইন মিনিমাল HTTP সার্ভার অন্তর্ভুক্ত করে।
explanation: JDK 18 একটি সিম্পল, জিরো-ডিপেন্ডেন্সি HTTP ফাইল সার্ভার যোগ করেছে, যা jwebserver কমান্ড-লাইন টুল বা SimpleFileServer API-এর মাধ্যমে অ্যাক্সেসযোগ্য। এটি একটি নির্দিষ্ট ডিরেক্টরি থেকে স্ট্যাটিক ফাইল সার্ভ করে, কোনো কনফিগারেশনের প্রয়োজন নেই। CLI টুলটি দ্রুত প্রোটোটাইপিং, টেস্টিং এবং অ্যাড-হক (ad-hoc) ফাইল শেয়ার করার জন্য আদর্শ – কোনো এক্সটার্নাল ডিপেন্ডেন্সি বা ফ্রেমওয়ার্কের প্রয়োজন নেই। API কাস্টমাইজেবল হ্যান্ডলার (customizable handlers) এবং আউটপুট লেভেল সহ প্রোগ্রামাটিক ব্যবহারের অনুমতি দেয়।
whyModernWins:
