---
title: কমপ্যাক্ট ক্যানোনিকাল কনস্ট্রাক্টর (Compact Canonical Constructor)
oldApproach: এক্সপ্লিসিট কনস্ট্রাক্টর ভ্যালিডেশন
modernApproach: কমপ্যাক্ট কনস্ট্রাক্টর
summary: প্যারামিটার লিস্ট রিপিট না করেই রেকর্ড ফিল্ডগুলোকে ভ্যালিডেট (validate) এবং নরমালাইজ (normalize) করুন।
explanation: রেকর্ডগুলো একটি কমপ্যাক্ট ক্যানোনিকাল কনস্ট্রাক্টর ডিক্লেয়ার (declare) করতে পারে, যা প্যারামিটার লিস্ট এবং ফিল্ড অ্যাসাইনমেন্ট বাদ দেয়। আপনার ভ্যালিডেশন লজিক রান করার পর কম্পাইলার স্বয়ংক্রিয়ভাবে ফিল্ডগুলোতে প্যারামিটার অ্যাসাইন করে। এটি প্রিকন্ডিশন চেক, ডিফেন্সিভ কপি এবং নরমালাইজেশনের জন্য আদর্শ।
whyModernWins:
- icon: "✂️"
  title: কম রিপিটেশন (Less Repetition)
  desc: প্যারামিটার লিস্ট রিপিট করা বা ম্যানুয়ালি প্রতিটি ফিল্ড অ্যাসাইন করার প্রয়োজন নেই।
- icon: "🛡️"
  title: ভ্যালিডেশন
  desc: null চেক, রেঞ্জ ভ্যালিডেশন এবং ডিফেন্সিভ কপির জন্য পারফেক্ট।
- icon: "📖"
  title: সুস্পষ্ট উদ্দেশ্য
  desc: কমপ্যাক্ট সিনট্যাক্স বয়লারপ্লেটের (boilerplate) পরিবর্তে ভ্যালিডেশনের উপর জোর দেয়।
