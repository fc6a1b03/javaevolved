---
title: ডিফল্টরূপে TLS 1.3
oldApproach: ম্যানুয়াল TLS কনফিগ (Config)
modernApproach: TLS 1.3 ডিফল্ট
summary: TLS 1.3 ডিফল্টরূপে এনাবল করা হয়েছে – কোনো এক্সপ্লিসিট প্রোটোকল কনফিগারেশনের প্রয়োজন নেই।
explanation: Java 11 TLS 1.3 সাপোর্ট যোগ করেছে এবং এটিকে পছন্দের প্রোটোকল হিসেবে তৈরি করেছে। HttpClient এটি স্বয়ংক্রিয়ভাবে ব্যবহার করে। সিকিউর কানেকশনের জন্য ম্যানুয়ালি প্রোটোকল ভার্সন উল্লেখ করার আর প্রয়োজন নেই।
whyModernWins:
- icon: "🛡️"
  title: আরও সিকিউর
  desc: TLS 1.3 অপ্রচলিত সাইফার স্যুট (cipher suites) এবং হ্যান্ডশেক প্যাটার্নগুলো (handshake patterns) সরিয়ে দেয়।
- icon: "⚡"
  title: দ্রুত হ্যান্ডশেক
  desc: TLS 1.3 এক রাউন্ড ট্রিপে (one round trip) সম্পূর্ণ হয়, যেখানে আগে দুটি লাগত।
- icon: "🆓"
  title: জিরো কনফিগ (Zero Config)
  desc: ডিফল্টরূপে সিকিউর – কোনো এক্সপ্লিসিট প্রোটোকল সিলেকশনের প্রয়োজন নেই।
support:
  description: JDK 11 (সেপ্টেম্বর 2018) থেকে ব্যাপকভাবে উপলব্ধ